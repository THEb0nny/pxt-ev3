name: Publish beta site

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pxt-ev3
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update version in package.json
        run: |
          CLEAN_VERSION=$(git describe --tags | sed 's/^v//')
          sed -i "s/\"version\": \".*\"/\"version\": \"$CLEAN_VERSION\"/" package.json

      - name: Checkout translations
        uses: actions/checkout@v4
        with:
          repository: pxt-ev3-community/pxt-ev3-translations
          path: translations

      - name: Get GitHub Pages path
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install PXT globally
        run: npm install -g pxt

      - name: Install project dependencies
        run: npm install --ignore-scripts

      - name: Build static package
        run: ./build_static_package.sh ${{ steps.pages.outputs.base_path }}

      - name: Verify package output exists
        run: |
          test -d built/packaged
          test -f built/packaged/${{ steps.pages.outputs.base_path }}/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: built/packaged/${{ steps.pages.outputs.base_path }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
