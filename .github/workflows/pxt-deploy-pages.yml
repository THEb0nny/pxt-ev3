name: Deploy PXT EV3 to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install PXT CLI
        run: npm install -g pxt@8.5.0

      - name: Clean install without prepare hooks
        run: npm ci --ignore-scripts --no-fund --no-audit

      - name: Fix TypeScript and WS types
        run: |
          npm install typescript@3.9.10 @types/ws@8.5.4 --no-save
          npm install --no-save

      - name: Build static package
        run: pxt staticpkg --route pxt-ev3

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: built/packaged/pxt-ev3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
