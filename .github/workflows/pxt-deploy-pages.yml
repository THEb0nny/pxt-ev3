name: Deploy PXT EV3 to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm install

      - name: Force compatible toolchain
        run: |
          npm install --save-dev typescript@3.9.10
          npm install --save-dev @types/ws@8.5.4
          npm install --save-dev ws@8.14.2

      - name: Rebuild pxt-core
        run: |
          cd node_modules/pxt-core
          npm install
          npx jake local

      - name: Install PXT CLI
        run: npm install -g pxt

      - name: Build static package
        run: pxt staticpkg --route pxt-ev3

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: built/packaged/pxt-ev3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
